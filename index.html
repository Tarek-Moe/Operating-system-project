<!DOCTYPE html>
<html lang="ar" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebOS Simulator</title>
  <style>
    /* ===== CSS Variables (Theme System) ===== */
    :root {
      --taskbar-h: 48px;
      --window-header: 36px;
      --accent: #0078d4;
      --accent-hover: #006bbf;
      --bg-desktop: #1a1a2e;
      --bg-window: #1e1e2e;
      --bg-window-header: #2a2a3e;
      --bg-taskbar: rgba(15,15,25,0.92);
      --text: #e0e0f0;
      --text-muted: #888aaa;
      --border: rgba(255,255,255,0.08);
      --shadow: 0 8px 32px rgba(0,0,0,0.5);
      --radius: 8px;
      --font: 'Segoe UI', system-ui, sans-serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: var(--font);
      background: var(--bg-desktop);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      user-select: none;
    }

    /* ===== Desktop ===== */
    #desktop {
      width: 100%;
      height: calc(100vh - var(--taskbar-h));
      position: relative;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
    }

    /* Desktop Icons */
    .desktop-icon {
      position: absolute;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      padding: 8px;
      border-radius: var(--radius);
      cursor: pointer;
      width: 80px;
      transition: background 0.15s;
    }
    .desktop-icon:hover { background: rgba(255,255,255,0.1); }
    .desktop-icon:active { background: rgba(255,255,255,0.18); }
    .desktop-icon .icon-img {
      font-size: 36px;
      line-height: 1;
    }
    .desktop-icon .icon-label {
      font-size: 12px;
      text-align: center;
      color: var(--text);
      text-shadow: 0 1px 3px rgba(0,0,0,0.8);
    }

    /* ===== Taskbar ===== */
    #taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: var(--taskbar-h);
      background: var(--bg-taskbar);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      z-index: 9000;
    }

    #start-btn {
      background: var(--accent);
      border: none;
      color: white;
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font);
      transition: background 0.15s;
    }
    #start-btn:hover { background: var(--accent-hover); }

    #taskbar-apps {
      display: flex;
      gap: 4px;
      flex: 1;
    }

    .taskbar-app-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font);
      transition: background 0.15s;
    }
    .taskbar-app-btn:hover { background: rgba(255,255,255,0.15); }
    .taskbar-app-btn.active { border-color: var(--accent); background: rgba(0,120,212,0.2); }

    #clock {
      font-size: 13px;
      color: var(--text);
      text-align: right;
      min-width: 80px;
    }

    /* ===== Window ===== */
    .window {
      position: absolute;
      min-width: 320px;
      min-height: 200px;
      background: var(--bg-window);
      border: 1px solid var(--border);
      border-radius: 10px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      z-index: 100;
      overflow: hidden;
      resize: both;
      transition: box-shadow 0.15s;
    }
    .window.focused {
      box-shadow: 0 12px 48px rgba(0,0,0,0.7), 0 0 0 1px rgba(0,120,212,0.3);
      z-index: 200;
    }

    .window-header {
      height: var(--window-header);
      background: var(--bg-window-header);
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 8px;
      cursor: move;
      flex-shrink: 0;
      border-bottom: 1px solid var(--border);
    }

    .window-controls {
      display: flex;
      gap: 6px;
    }
    .win-btn {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: filter 0.1s;
    }
    .win-btn:hover { filter: brightness(1.3); }
    .win-btn.close   { background: #ff5f57; }
    .win-btn.min     { background: #ffbd2e; }
    .win-btn.max     { background: #28c941; }

    .window-title {
      font-size: 13px;
      font-weight: 500;
      flex: 1;
      pointer-events: none;
    }

    .window-content {
      flex: 1;
      overflow: auto;
      padding: 16px;
    }

    /* ===== Terminal App ===== */
    .terminal {
      background: #0d1117;
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      padding: 12px;
      height: 100%;
      display: flex;
      flex-direction: column;
    }
    .terminal-output {
      flex: 1;
      overflow-y: auto;
      margin-bottom: 8px;
      line-height: 1.6;
    }
    .terminal-output .line { padding: 1px 0; }
    .terminal-output .line.success { color: #3fb950; }
    .terminal-output .line.error   { color: #f85149; }
    .terminal-output .line.info    { color: #58a6ff; }
    .terminal-output .line.prompt  { color: #7ee787; }

    .terminal-input-row {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .terminal-prompt-label { color: #7ee787; }
    .terminal-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: inherit;
      font-size: 13px;
      caret-color: #7ee787;
    }

    /* ===== File Manager ===== */
    .filemanager { padding: 0; }
    .fm-toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }
    .fm-path {
      flex: 1;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      color: var(--text-muted);
    }
    .fm-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font);
    }
    .fm-btn:hover { background: rgba(255,255,255,0.12); }

    .fm-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 12px;
    }
    .fm-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      padding: 8px;
      border-radius: 6px;
      cursor: pointer;
      width: 72px;
      transition: background 0.12s;
    }
    .fm-item:hover { background: rgba(255,255,255,0.08); }
    .fm-item .fm-icon { font-size: 28px; }
    .fm-item .fm-name { font-size: 11px; text-align: center; word-break: break-word; color: var(--text); }
    .fm-item.folder .fm-icon::before { content: '📁'; }
    .fm-item.file   .fm-icon::before { content: '📄'; }

    /* ===== Start Menu ===== */
    #start-menu {
      position: fixed;
      bottom: var(--taskbar-h);
      left: 12px;
      width: 280px;
      background: rgba(20,20,35,0.96);
      backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      z-index: 9500;
      display: none;
    }
    #start-menu.visible { display: block; }
    .sm-title { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; padding: 0 4px; }
    .sm-app {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.12s;
    }
    .sm-app:hover { background: rgba(255,255,255,0.08); }
    .sm-app .sm-icon { font-size: 20px; }
    .sm-app .sm-name { font-size: 13px; }

    /* ===== Boot Screen ===== */
    #boot-screen {
      position: fixed;
      inset: 0;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 99999;
      transition: opacity 0.8s;
    }
    #boot-screen.fadeout { opacity: 0; pointer-events: none; }
    .boot-logo { font-size: 48px; margin-bottom: 16px; }
    .boot-name { font-size: 28px; font-weight: 300; letter-spacing: 6px; color: #fff; margin-bottom: 32px; }
    .boot-bar-wrap { width: 200px; height: 3px; background: rgba(255,255,255,0.15); border-radius: 2px; overflow: hidden; }
    .boot-bar { height: 100%; background: var(--accent); width: 0; border-radius: 2px; transition: width 0.1s linear; }
  </style>
</head>
<body>

<!-- Boot Screen -->
<div id="boot-screen">
  <div class="boot-logo">💠</div>
  <div class="boot-name">W E B O S</div>
  <div class="boot-bar-wrap"><div class="boot-bar" id="boot-bar"></div></div>
</div>

<!-- Desktop -->
<div id="desktop"></div>

<!-- Taskbar -->
<div id="taskbar">
  <button id="start-btn" onclick="toggleStartMenu()">⊞ Start</button>
  <div id="taskbar-apps"></div>
  <div id="clock"></div>
</div>

<!-- Start Menu -->
<div id="start-menu">
  <div class="sm-title">Applications</div>
  <div class="sm-app" onclick="openApp('terminal')">
    <span class="sm-icon">🖥️</span><span class="sm-name">Terminal</span>
  </div>
  <div class="sm-app" onclick="openApp('filemanager')">
    <span class="sm-icon">📁</span><span class="sm-name">File Manager</span>
  </div>
  <div class="sm-app" onclick="openApp('texteditor')">
    <span class="sm-icon">📝</span><span class="sm-name">Text Editor</span>
  </div>
  <div class="sm-app" onclick="openApp('calculator')">
    <span class="sm-icon">🔢</span><span class="sm-name">Calculator</span>
  </div>
</div>

<!-- Window Container (windows are appended here dynamically) -->

<script>
// ============================================================
// KERNEL: FileSystem Module
// ============================================================
const FileSystem = {
  tree: {
    '/': {
      type: 'dir',
      children: {
        'home': {
          type: 'dir',
          children: {
            'user': {
              type: 'dir',
              children: {
                'Documents': { type: 'dir', children: {} },
                'Downloads': { type: 'dir', children: {} },
                'Desktop':   { type: 'dir', children: {} },
                'readme.txt': { type: 'file', content: 'Welcome to WebOS Simulator!\nBuilt with HTML, CSS, and JavaScript.' }
              }
            }
          }
        },
        'etc': { type: 'dir', children: {} },
        'tmp': { type: 'dir', children: {} }
      }
    }
  },
  cwd: '/home/user',

  resolve(path) {
    if (path.startsWith('/')) return path;
    const parts = (this.cwd + '/' + path).split('/').filter(Boolean);
    const stack = [];
    for (const p of parts) {
      if (p === '..') stack.pop();
      else if (p !== '.') stack.push(p);
    }
    return '/' + stack.join('/');
  },

  getNode(path) {
    const abs = this.resolve(path);
    const parts = abs.split('/').filter(Boolean);
    let node = this.tree['/'];
    for (const p of parts) {
      if (!node || node.type !== 'dir') return null;
      node = node.children[p];
    }
    return node || null;
  },

  ls(path = '.') {
    const node = this.getNode(path);
    if (!node || node.type !== 'dir') return null;
    return Object.entries(node.children).map(([name, n]) => ({ name, type: n.type }));
  },

  mkdir(name) {
    const parent = this.getNode(this.cwd);
    if (!parent || parent.type !== 'dir') return false;
    if (parent.children[name]) return false;
    parent.children[name] = { type: 'dir', children: {} };
    return true;
  },

  touch(name, content = '') {
    const parent = this.getNode(this.cwd);
    if (!parent || parent.type !== 'dir') return false;
    parent.children[name] = { type: 'file', content };
    return true;
  },

  cat(name) {
    const node = this.getNode(name);
    if (!node || node.type !== 'file') return null;
    return node.content;
  },

  cd(path) {
    const abs = this.resolve(path);
    const node = this.getNode(abs);
    if (!node || node.type !== 'dir') return false;
    this.cwd = abs;
    return true;
  },

  rm(name) {
    const parent = this.getNode(this.cwd);
    if (!parent || !parent.children[name]) return false;
    delete parent.children[name];
    return true;
  }
};

// ============================================================
// KERNEL: Process Manager
// ============================================================
const ProcessManager = {
  processes: {},
  nextPid: 1,
  focusedPid: null,

  create(name, windowEl) {
    const pid = this.nextPid++;
    this.processes[pid] = { pid, name, windowEl, minimized: false };
    this.focus(pid);
    this.updateTaskbar();
    return pid;
  },

  close(pid) {
    const proc = this.processes[pid];
    if (!proc) return;
    proc.windowEl.remove();
    delete this.processes[pid];
    this.focusedPid = null;
    this.updateTaskbar();
  },

  focus(pid) {
    if (this.focusedPid !== null) {
      const prev = this.processes[this.focusedPid];
      if (prev) prev.windowEl.classList.remove('focused');
    }
    this.focusedPid = pid;
    const proc = this.processes[pid];
    if (proc) {
      proc.windowEl.classList.add('focused');
      if (proc.minimized) this.restore(pid);
    }
    this.updateTaskbar();
  },

  minimize(pid) {
    const proc = this.processes[pid];
    if (!proc) return;
    proc.minimized = true;
    proc.windowEl.style.display = 'none';
    this.updateTaskbar();
  },

  restore(pid) {
    const proc = this.processes[pid];
    if (!proc) return;
    proc.minimized = false;
    proc.windowEl.style.display = 'flex';
    this.focus(pid);
  },

  updateTaskbar() {
    const bar = document.getElementById('taskbar-apps');
    bar.innerHTML = '';
    for (const [pid, proc] of Object.entries(this.processes)) {
      const btn = document.createElement('button');
      btn.className = 'taskbar-app-btn' + (parseInt(pid) === this.focusedPid ? ' active' : '');
      btn.textContent = proc.name;
      btn.onclick = () => {
        if (parseInt(pid) === this.focusedPid && !proc.minimized) {
          this.minimize(parseInt(pid));
        } else {
          this.restore(parseInt(pid));
        }
      };
      bar.appendChild(btn);
    }
  }
};

// ============================================================
// UI: Window Factory
// ============================================================
function createWindow({ title, width = 600, height = 400, content, appKey }) {
  const win = document.createElement('div');
  win.className = 'window';
  win.style.width  = width  + 'px';
  win.style.height = height + 'px';
  win.style.left   = (120 + Math.random() * 100) + 'px';
  win.style.top    = (60  + Math.random() * 80) + 'px';

  win.innerHTML = `
    <div class="window-header" data-drag>
      <div class="window-controls">
        <button class="win-btn close"  title="Close"></button>
        <button class="win-btn min"    title="Minimize"></button>
        <button class="win-btn max"    title="Maximize"></button>
      </div>
      <span class="window-title">${title}</span>
    </div>
    <div class="window-content" style="padding:0;overflow:hidden;">${content}</div>
  `;

  document.body.appendChild(win);
  const pid = ProcessManager.create(title, win);

  win.querySelector('.win-btn.close').onclick  = () => ProcessManager.close(pid);
  win.querySelector('.win-btn.min').onclick    = () => ProcessManager.minimize(pid);
  win.querySelector('.win-btn.max').onclick    = () => toggleMaximize(win);
  win.addEventListener('mousedown', () => ProcessManager.focus(pid));

  makeDraggable(win);
  return { win, pid };
}

let _maximized = null;
function toggleMaximize(win) {
  if (_maximized === win) {
    win.style.cssText = win._prevStyle;
    _maximized = null;
  } else {
    win._prevStyle = win.style.cssText;
    win.style.cssText = `position:absolute;left:0;top:0;width:100%;height:calc(100vh - 48px);border-radius:0;resize:none;`;
    _maximized = win;
  }
}

function makeDraggable(win) {
  const header = win.querySelector('[data-drag]');
  let ox, oy, dragging = false;
  header.addEventListener('mousedown', e => {
    if (e.target.classList.contains('win-btn')) return;
    dragging = true;
    ox = e.clientX - win.offsetLeft;
    oy = e.clientY - win.offsetTop;
    document.body.style.cursor = 'move';
  });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    win.style.left = (e.clientX - ox) + 'px';
    win.style.top  = Math.max(0, e.clientY - oy) + 'px';
  });
  document.addEventListener('mouseup', () => {
    dragging = false;
    document.body.style.cursor = '';
  });
}

// ============================================================
// APP: Terminal
// ============================================================
function buildTerminal() {
  return `<div class="terminal">
    <div class="terminal-output" id="term-output"></div>
    <div class="terminal-input-row">
      <span class="terminal-prompt-label" id="term-prompt">user@webos:~$</span>
      <input class="terminal-input" id="term-input" autofocus placeholder="type a command...">
    </div>
  </div>`;
}

function initTerminal() {
  const output = document.getElementById('term-output');
  const input  = document.getElementById('term-input');
  const prompt = document.getElementById('term-prompt');
  const history = [];
  let histIdx = -1;

  function print(text, cls = '') {
    const d = document.createElement('div');
    d.className = 'line ' + cls;
    d.textContent = text;
    output.appendChild(d);
    output.scrollTop = output.scrollHeight;
  }

  print('WebOS Terminal v1.0', 'info');
  print('Type "help" for available commands.', 'info');
  print('');

  function updatePrompt() {
    prompt.textContent = `user@webos:${FileSystem.cwd}$`;
  }

  const commands = {
    help: () => {
      print('Available commands:', 'info');
      print('  ls           — list files in current directory');
      print('  cd <dir>     — change directory');
      print('  pwd          — print working directory');
      print('  mkdir <name> — create a new folder');
      print('  touch <name> — create a new file');
      print('  cat <file>   — read a file');
      print('  rm <name>    — remove file or folder');
      print('  echo <text>  — print text');
      print('  clear        — clear the terminal');
      print('  date         — show current date/time');
    },
    ls: (args) => {
      const items = FileSystem.ls(args[0] || '.');
      if (!items) { print('ls: not a directory', 'error'); return; }
      if (items.length === 0) { print('(empty directory)', 'info'); return; }
      items.forEach(item => print(`  ${item.type === 'dir' ? '📁' : '📄'} ${item.name}`));
    },
    cd: (args) => {
      if (!args[0]) { FileSystem.cd('/home/user'); updatePrompt(); return; }
      if (!FileSystem.cd(args[0])) print('cd: no such directory: ' + args[0], 'error');
      updatePrompt();
    },
    pwd: () => print(FileSystem.cwd),
    mkdir: (args) => {
      if (!args[0]) { print('usage: mkdir <name>', 'error'); return; }
      if (!FileSystem.mkdir(args[0])) print('mkdir: cannot create directory', 'error');
      else print(`Directory '${args[0]}' created.`, 'success');
    },
    touch: (args) => {
      if (!args[0]) { print('usage: touch <name>', 'error'); return; }
      FileSystem.touch(args[0]);
      print(`File '${args[0]}' created.`, 'success');
    },
    cat: (args) => {
      if (!args[0]) { print('usage: cat <file>', 'error'); return; }
      const c = FileSystem.cat(args[0]);
      if (c === null) print('cat: no such file', 'error');
      else c.split('\n').forEach(l => print(l));
    },
    rm: (args) => {
      if (!args[0]) { print('usage: rm <name>', 'error'); return; }
      if (!FileSystem.rm(args[0])) print('rm: no such file or directory', 'error');
      else print(`Removed '${args[0]}'.`, 'success');
    },
    echo: (args) => print(args.join(' ')),
    clear: () => { output.innerHTML = ''; },
    date: () => print(new Date().toString(), 'info'),
  };

  input.addEventListener('keydown', e => {
    if (e.key === 'Enter') {
      const raw = input.value.trim();
      if (!raw) return;
      history.unshift(raw);
      histIdx = -1;
      print(`user@webos:${FileSystem.cwd}$ ${raw}`, 'prompt');
      const parts = raw.split(/\s+/);
      const cmd = parts[0];
      const args = parts.slice(1);
      if (commands[cmd]) commands[cmd](args);
      else print(`command not found: ${cmd}`, 'error');
      input.value = '';
    } else if (e.key === 'ArrowUp') {
      if (histIdx < history.length - 1) { histIdx++; input.value = history[histIdx]; }
    } else if (e.key === 'ArrowDown') {
      if (histIdx > 0) { histIdx--; input.value = history[histIdx]; }
      else { histIdx = -1; input.value = ''; }
    }
  });
}

// ============================================================
// APP: File Manager
// ============================================================
function buildFileManager() {
  return `<div class="filemanager" style="height:100%;display:flex;flex-direction:column;">
    <div class="fm-toolbar">
      <button class="fm-btn" id="fm-back">← Back</button>
      <div class="fm-path" id="fm-path">/home/user</div>
      <button class="fm-btn" id="fm-new-folder">+ Folder</button>
      <button class="fm-btn" id="fm-new-file">+ File</button>
    </div>
    <div class="fm-grid" id="fm-grid"></div>
  </div>`;
}

function initFileManager() {
  let currentPath = FileSystem.cwd;

  function render() {
    const grid = document.getElementById('fm-grid');
    const pathEl = document.getElementById('fm-path');
    if (!grid) return;
    pathEl.textContent = currentPath;
    grid.innerHTML = '';

    // Parent dir
    if (currentPath !== '/') {
      const back = document.createElement('div');
      back.className = 'fm-item folder';
      back.innerHTML = '<div class="fm-icon"></div><div class="fm-name">..</div>';
      back.onclick = () => {
        currentPath = currentPath.split('/').slice(0,-1).join('/') || '/';
        render();
      };
      grid.appendChild(back);
    }

    const savedCwd = FileSystem.cwd;
    FileSystem.cwd = currentPath;
    const items = FileSystem.ls('.');
    FileSystem.cwd = savedCwd;
    if (!items) return;

    items.forEach(item => {
      const el = document.createElement('div');
      el.className = `fm-item ${item.type}`;
      el.innerHTML = `<div class="fm-icon"></div><div class="fm-name">${item.name}</div>`;
      if (item.type === 'dir') {
        el.ondblclick = () => {
          currentPath = (currentPath === '/' ? '' : currentPath) + '/' + item.name;
          render();
        };
      }
      grid.appendChild(el);
    });
  }

  document.getElementById('fm-new-folder').onclick = () => {
    const name = prompt('Folder name:');
    if (name) {
      const saved = FileSystem.cwd;
      FileSystem.cwd = currentPath;
      FileSystem.mkdir(name);
      FileSystem.cwd = saved;
      render();
    }
  };

  document.getElementById('fm-new-file').onclick = () => {
    const name = prompt('File name:');
    if (name) {
      const saved = FileSystem.cwd;
      FileSystem.cwd = currentPath;
      FileSystem.touch(name);
      FileSystem.cwd = saved;
      render();
    }
  };

  render();
}

// ============================================================
// App Launcher
// ============================================================
const appConfigs = {
  terminal: {
    title: '🖥️ Terminal',
    width: 680, height: 420,
    build: buildTerminal,
    init: initTerminal
  },
  filemanager: {
    title: '📁 File Manager',
    width: 640, height: 440,
    build: buildFileManager,
    init: initFileManager
  },
  texteditor: {
    title: '📝 Text Editor',
    width: 560, height: 400,
    build: () => `<textarea style="width:100%;height:100%;background:#0d1117;color:#e0e0f0;
      border:none;outline:none;padding:16px;font-family:'Cascadia Code',monospace;
      font-size:13px;resize:none;line-height:1.7;" placeholder="Start typing..."></textarea>`,
    init: () => {}
  },
  calculator: {
    title: '🔢 Calculator',
    width: 300, height: 420,
    build: () => `<div style="padding:16px;font-family:monospace;">
      <input id="calc-display" readonly style="width:100%;background:rgba(0,0,0,0.4);
        border:1px solid rgba(255,255,255,0.1);color:#fff;font-size:24px;
        text-align:right;padding:8px 12px;border-radius:6px;margin-bottom:12px;">
      <div id="calc-btns" style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;"></div>
    </div>`,
    init: () => {
      const btns = ['C','±','%','÷','7','8','9','×','4','5','6','-','1','2','3','+','0','.','⌫','='];
      const container = document.getElementById('calc-btns');
      const display   = document.getElementById('calc-display');
      let expr = '';
      btns.forEach(b => {
        const btn = document.createElement('button');
        btn.textContent = b;
        btn.style.cssText = `padding:14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);
          color:#fff;border-radius:6px;cursor:pointer;font-size:16px;font-family:monospace;
          transition:background .1s;`;
        btn.onmouseover = () => btn.style.background = 'rgba(255,255,255,0.14)';
        btn.onmouseout  = () => btn.style.background = 'rgba(255,255,255,0.07)';
        btn.onclick = () => {
          if (b === 'C')  { expr = ''; display.value = '0'; }
          else if (b === '⌫') { expr = expr.slice(0,-1); display.value = expr || '0'; }
          else if (b === '=') {
            try {
              const safe = expr.replace(/×/g,'*').replace(/÷/g,'/');
              display.value = eval(safe);
              expr = String(eval(safe));
            } catch { display.value = 'Error'; expr = ''; }
          } else { expr += b; display.value = expr; }
        };
        container.appendChild(btn);
      });
    }
  }
};

function openApp(key) {
  const cfg = appConfigs[key];
  if (!cfg) return;
  closeStartMenu();
  const { win } = createWindow({
    title: cfg.title,
    width: cfg.width,
    height: cfg.height,
    content: cfg.build(),
    appKey: key
  });
  setTimeout(() => cfg.init(), 50);
}

// ============================================================
// Desktop Icons
// ============================================================
function buildDesktopIcons() {
  const desktop = document.getElementById('desktop');
  const icons = [
    { label: 'Terminal',     emoji: '🖥️', app: 'terminal',    x: 20,  y: 20 },
    { label: 'Files',        emoji: '📁', app: 'filemanager', x: 20,  y: 120 },
    { label: 'Text Editor',  emoji: '📝', app: 'texteditor',  x: 20,  y: 220 },
    { label: 'Calculator',   emoji: '🔢', app: 'calculator',  x: 20,  y: 320 },
  ];
  icons.forEach(ic => {
    const el = document.createElement('div');
    el.className = 'desktop-icon';
    el.style.left = ic.x + 'px';
    el.style.top  = ic.y + 'px';
    el.innerHTML = `<div class="icon-img">${ic.emoji}</div><div class="icon-label">${ic.label}</div>`;
    el.ondblclick = () => openApp(ic.app);
    desktop.appendChild(el);
  });
}

// ============================================================
// Start Menu + Clock
// ============================================================
function toggleStartMenu() {
  document.getElementById('start-menu').classList.toggle('visible');
}
function closeStartMenu() {
  document.getElementById('start-menu').classList.remove('visible');
}
document.addEventListener('click', e => {
  const sm = document.getElementById('start-menu');
  if (!sm.contains(e.target) && e.target.id !== 'start-btn') closeStartMenu();
});

function startClock() {
  const el = document.getElementById('clock');
  function tick() {
    const now = new Date();
    el.innerHTML = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })
      + '<br>' + now.toLocaleDateString([], { month: 'short', day: 'numeric' });
  }
  tick();
  setInterval(tick, 1000);
}

// ============================================================
// Boot Sequence
// ============================================================
function boot() {
  const bar = document.getElementById('boot-bar');
  const screen = document.getElementById('boot-screen');
  let progress = 0;
  const interval = setInterval(() => {
    progress += Math.random() * 12 + 4;
    bar.style.width = Math.min(progress, 100) + '%';
    if (progress >= 100) {
      clearInterval(interval);
      setTimeout(() => {
        screen.classList.add('fadeout');
        setTimeout(() => screen.remove(), 900);
      }, 300);
    }
  }, 80);
}

// ============================================================
// Init
// ============================================================
window.addEventListener('load', () => {
  boot();
  buildDesktopIcons();
  startClock();
});
</script>
